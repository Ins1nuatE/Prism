proxy-groups:
  - name: "Default Proxy"
    type: "select"
    proxies:
      - "Auto"
      - "Express"
      - "HK"
      - "TW"
      - "JP"
      - "SG"
      - "US"
      - "Download"

  - name: "AI + Research"
    type: "select"
    proxies:
      - "HK"
      - "TW"
      - "JP"
      - "SG"
      - "US"

  - name: "Developer"
    type: "select"
    proxies:
      - "HK"
      - "TW"
      - "JP"
      - "SG"
      - "US"

  - name: "Steam"
    type: "select"
    proxies:
      - "DIRECT"
      - "Download"
      - "HK"
      - "TW"
      - "JP"
      - "SG"
      - "US"

  - name: "Streaming"
    type: "select"
    proxies:
      - "Express"
      - "HK"
      - "TW"
      - "JP"
      - "SG"
      - "US"

  - name: "Apple"
    type: "select"
    proxies:
      - "DIRECT"
      - "HK"
      - "TW"
      - "JP"
      - "SG"
      - "US"

  - name: "Microsoft"
    type: "select"
    proxies:
      - "DIRECT"
      - "HK"
      - "TW"
      - "JP"
      - "SG"
      - "US"

  - name: "AdBlock"
    type: "select"
    proxies:
      - "REJECT"
      - "DIRECT"

  - name: "Download"
    type: "select"
    proxies:
      - "DIRECT"
      - "HK"
      - "TW"
      - "JP"
      - "SG"
      - "US"

  - name: "Final"
    type: "select"
    proxies:
      - "Default Proxy"
      - "DIRECT"

  - name: "Auto"
    type: "url-test"
    hidden: true
    url: "http://www.gstatic.com/generate_204"
    interval: 180
    tolerance: 100
    include-all-proxies: true

  - name: "Express"
    type: "url-test"
    hidden: true
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100
    include-all-proxies: true
    filter: "(?i)(香港|hong\\s?kong|(?:^|[\\s\\-_|\\[\\]()])hk(?:$|[\\s\\-_|\\[\\]()])|台湾|台灣|taiwan|(?:^|[\\s\\-_|\\[\\]()])tw(?:$|[\\s\\-_|\\[\\]()])|日本|japan|(?:^|[\\s\\-_|\\[\\]()])jp(?:$|[\\s\\-_|\\[\\]()])|新加坡|狮城|獅城|singapore|(?:^|[\\s\\-_|\\[\\]()])sg(?:$|[\\s\\-_|\\[\\]()])|美国|美國|united\\s?states|america|usa|(?:^|[\\s\\-_|\\[\\]()])us(?:$|[\\s\\-_|\\[\\]()]))"

  - name: "HK"
    type: "url-test"
    hidden: true
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100
    include-all-proxies: true
    filter: "(?i)(香港|hong\\s?kong|(?:^|[\\s\\-_|\\[\\]()])hk(?:$|[\\s\\-_|\\[\\]()]))"

  - name: "TW"
    type: "url-test"
    hidden: true
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100
    include-all-proxies: true
    filter: "(?i)(台湾|台灣|taiwan|(?:^|[\\s\\-_|\\[\\]()])tw(?:$|[\\s\\-_|\\[\\]()]))"

  - name: "JP"
    type: "url-test"
    hidden: true
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100
    include-all-proxies: true
    filter: "(?i)(日本|japan|(?:^|[\\s\\-_|\\[\\]()])jp(?:$|[\\s\\-_|\\[\\]()]))"

  - name: "SG"
    type: "url-test"
    hidden: true
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100
    include-all-proxies: true
    filter: "(?i)(新加坡|狮城|獅城|singapore|(?:^|[\\s\\-_|\\[\\]()])sg(?:$|[\\s\\-_|\\[\\]()]))"

  - name: "US"
    type: "url-test"
    hidden: true
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 100
    include-all-proxies: true
    filter: "(?i)(美国|美國|united\\s?states|america|usa|(?:^|[\\s\\-_|\\[\\]()])us(?:$|[\\s\\-_|\\[\\]()]))"

